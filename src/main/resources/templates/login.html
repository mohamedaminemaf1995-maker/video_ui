<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Arcad</title>
    <style>
        :root {
            --bg: #05070a;
            --panel: #0f172a;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --blue: #3b82f6;
            --blue-hover: #2563eb;
            --accent: #0ea5e9;
        }
        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at 20% 10%, rgba(14,165,233,0.06), transparent 45%), linear-gradient(180deg, #04050a 0%, #050912 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: linear-gradient(135deg, #0b1225, #0f172a);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(59,130,246,0.18);
            padding: 38px 32px 32px 32px;
            width: 100%;
            max-width: 370px;
            border: 1px solid rgba(59,130,246,0.18);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .login-title {
            font-size: 26px;
            font-weight: 700;
            color: #dbeafe;
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 24px;
        }
        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid rgba(148,163,184,0.35);
            background: rgba(15,23,42,0.7);
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .login-input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 2px rgba(59,130,246,0.18);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--blue), var(--accent));
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            margin-top: 8px;
        }
        .login-btn:hover {
            background: linear-gradient(135deg, var(--blue-hover), var(--blue));
            transform: translateY(-2px) scale(1.03);
        }
        .login-error {
            color: #0080ff;
            font-size: 13px;
            margin-bottom: 10px;
            min-height: 18px;
        }
        .login-logo {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            margin-bottom: 18px;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(59,130,246,0.18);
        }
    </style>
</head>
<body>
    <form class="login-container" id="loginForm" autocomplete="on">
        <img src="/2938237.png" alt="Logo" class="login-logo">
        <div class="login-error" id="loginError"></div>
        <input class="login-input" type="text" name="username" placeholder="Nom d'utilisateur" required autofocus>
        <input class="login-input" type="password" name="password" placeholder="Mot de passe" required>
        <button class="login-btn" type="submit">Go !</button>
    </form>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = '';
            const form = e.target;
            const username = form.username.value.trim();
            const password = form.password.value;
            if (!username || !password) {
                errorDiv.textContent = 'Veuillez remplir tous les champs.';
                return;
            }
            try {
                const res = await fetch('/api/config/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ username, password })
                });
                if (res.ok) {
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = 'Identifiants invalides.';
                }
            } catch (err) {
                errorDiv.textContent = 'Erreur réseau.';
            }
        });
    </script>
</body>
</html>
