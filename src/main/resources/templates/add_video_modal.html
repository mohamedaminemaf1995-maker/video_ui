<!-- Modal d'ajout vidéo -->
<div id="addVideoModal" style="display:none; position:fixed; inset:0; z-index:10000; background:rgba(0,0,32,0.88); align-items:center; justify-content:center;">
    <form id="addVideoForm" style="background:linear-gradient(135deg,#0ea5e9,#6366f1); border-radius:18px; box-shadow:0 8px 32px #0008; padding:36px 32px 28px 32px; min-width:340px; max-width:98vw; width:400px; color:#fff; display:flex; flex-direction:column; gap:18px; position:relative;">
        <button type="button" onclick="closeAddVideoModal()" style="position:absolute; top:16px; right:16px; background:rgba(15,23,42,0.7); color:#fff; border:none; border-radius:8px; width:32px; height:32px; font-size:18px; cursor:pointer;">✕</button>
        <h2 style="margin:0 0 8px 0; font-size:1.5rem; font-weight:800; letter-spacing:0.03em; text-align:center; background:linear-gradient(90deg,#fff,#bae6fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent; background-clip:text; color:transparent;">Nouvelle vidéo</h2>
        <input name="title" class="host-input" type="text" placeholder="Titre de la vidéo" required style="background:rgba(255,255,255,0.08); color:#fff;" />
        <input name="fileName" class="host-input" type="text" placeholder="Nom du fichier (ex: A69_001_DDDD.mp4)" required style="background:rgba(255,255,255,0.08); color:#fff;" />
        <input name="creators" class="host-input" type="text" placeholder="Créateurs (séparés par virgule)" style="background:rgba(255,255,255,0.08); color:#fff;" />
        <input name="albums" class="host-input" type="text" placeholder="Albums (séparés par virgule)" style="background:rgba(255,255,255,0.08); color:#fff;" />
        <input name="sourceIndex" class="host-input" type="number" min="1" max="5" placeholder="Niveau (1-5)" style="background:rgba(255,255,255,0.08); color:#fff;" />
        <input name="createdAt" id="createdAtInput" class="host-input" type="text" placeholder="Date de création" readonly style="background:rgba(255,255,255,0.08); color:#fff;" />
        <label style="font-size:13px; color:#e0e7ef;">Thumbnail <span style="color:#f87171;">*</span> <input name="thumbnail" type="file" accept="image/*" required style="margin-left:8px;" /></label>
        <label style="font-size:13px; color:#e0e7ef;">Vidéo (optionnelle) <input name="videoFile" type="file" accept="video/mp4,video/*" style="margin-left:8px;" /></label>
        <button type="submit" class="nav-chip" style="margin-top:10px; font-size:1.1rem; display:flex; align-items:center; justify-content:center; gap:8px;">
            Ajouter
        </button>
        <div id="addVideoStatus" style="font-size:13px; min-height:18px; color:#bae6fd; text-align:center;"></div>
    </form>
</div>
<script>
function openAddVideoModal() {
    const modal = document.getElementById('addVideoModal');
    modal.style.display = 'flex';
    modal.style.alignItems = 'center';
    modal.style.justifyContent = 'center';
    // Remplit la date de création automatiquement
    const now = new Date();
    const pad = n => n.toString().padStart(2, '0');
    const formatted = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
    document.getElementById('createdAtInput').value = formatted;
}
function closeAddVideoModal() {
    document.getElementById('addVideoModal').style.display = 'none';
    document.getElementById('addVideoForm').reset();
    document.getElementById('addVideoStatus').textContent = '';
}
document.getElementById('addVideoForm').onsubmit = async function(e) {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);
    document.getElementById('addVideoStatus').textContent = 'Ajout en cours...';
    try {
        const res = await fetch('/api/videos/upload', {
            method: 'POST',
            body: formData
        });
        if (res.ok) {
            document.getElementById('addVideoStatus').textContent = 'Vidéo ajoutée !';
            setTimeout(() => {
                closeAddVideoModal();
                loadVideos();
            }, 900);
        } else {
            const txt = await res.text();
            document.getElementById('addVideoStatus').textContent = 'Erreur: ' + txt;
        }
    } catch (err) {
        document.getElementById('addVideoStatus').textContent = 'Erreur: ' + err;
    }
};
</script>
