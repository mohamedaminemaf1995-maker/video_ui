<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réglages - Ar44</title>
    <link rel="icon" href="/2938237.png">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0b1225 0%, #1e293b 100%);
            color: #e0e7ef;
        }

        .app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            background: linear-gradient(135deg, #0b1225 60%, #1e293b 100%);
            box-shadow: 2px 0 16px #0002;
            min-width: 220px;
            width: 220px;
            padding: 10px 8px;
        }

        .container {
            flex: 1;
            padding: 32px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        .nav-chip-wrap {
            display: grid;
            grid-template-columns: 1fr;
            gap: 7px;
            margin-bottom: 10px;
        }

        .nav-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid rgba(148,163,184,0.32);
            background: rgba(15,23,42,0.72);
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .nav-chip:hover {
            transform: translateX(3px);
            border-color: rgba(56,189,248,0.6);
            background: rgba(30,41,59,0.95);
        }

        .nav-chip.active {
            border-color: rgba(56,189,248,0.8);
            background: linear-gradient(90deg, rgba(56,189,248,0.2), rgba(99,102,241,0.2));
            color: #e0f2fe;
            box-shadow: 0 6px 16px rgba(30,64,175,0.2);
        }

        .btn,
        .btn-secondary {
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn {
            background: linear-gradient(90deg, #38bdf8, #6366f1);
            color: #fff;
        }

        .btn-secondary {
            background: #1e293b;
            color: #60a5fa;
            border: 1px solid #334155;
        }

        .panel {
            background: rgba(15,23,42,0.75);
            border: 1px solid rgba(56,189,248,0.25);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 18px;
        }

        .panel-title {
            margin: 0 0 12px 0;
            font-size: 18px;
            color: #dbeafe;
        }

        .host-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .host-input {
            flex: 1;
            min-width: 240px;
            background: rgba(11,17,36,0.85);
            color: #e0f2fe;
            border: 1px solid rgba(59,130,246,0.35);
            border-radius: 8px;
            padding: 10px 12px;
        }

        .muted {
            color: #94a3b8;
            font-size: 13px;
            margin-top: 8px;
        }

        .album-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .album-input {
            background: rgba(11,17,36,0.85);
            color: #e0f2fe;
            border: 1px solid rgba(59,130,246,0.35);
            border-radius: 8px;
            padding: 8px 10px;
            min-width: 220px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border-bottom: 1px solid rgba(148,163,184,0.2);
            padding: 10px 8px;
            text-align: left;
            font-size: 14px;
        }

        th {
            color: #93c5fd;
            font-weight: 700;
        }

        .status {
            margin-top: 10px;
            color: #93c5fd;
            min-height: 18px;
            font-size: 13px;
        }

        @media (max-width: 920px) {
            .app {
                flex-direction: column;
            }

            .sidebar {
                width: auto;
                min-width: 0;
            }

            .container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:18px;">
            <img src="/2938237.png" alt="icon" style="width:38px; height:38px; border-radius:10px; box-shadow:0 2px 8px #0003;">
            <span style="font-family:'Segoe UI',Arial,sans-serif; font-size:1.7rem; font-weight:800; letter-spacing:0.04em; background:linear-gradient(90deg,#38bdf8,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent; background-clip:text; color:transparent;">Ar44</span>
            <button onclick="location.href='/settings'" title="Réglages" style="margin-left:auto; background:rgba(59,130,246,0.22); border:none; color:#93c5fd; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer;">⚙</button>
            <button onclick="logout()" title="Déconnexion" style="background:rgba(239,68,68,0.18); border:none; color:#f87171; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer;">
                <svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' fill='none' viewBox='0 0 24 24'><path stroke='#f87171' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' d='M17 17L7 7m10 0L7 17'/></svg>
            </button>
        </div>

        <div class="nav-chip-wrap">
            <button class="nav-chip" onclick="location.href='/'">Bibliothèque</button>
            <button class="nav-chip" onclick="location.href='/favorites'">Favoris</button>
            <button class="nav-chip" onclick="location.href='/recently'">Récemment vus</button>
        </div>
    </div>

    <div class="container">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap;">
            <button class="btn-secondary" onclick="location.href='/'">Bibliothèque</button>
            <button class="btn-secondary" onclick="location.href='/favorites'">Favoris</button>
            <button class="btn-secondary" onclick="location.href='/recently'">Récemment vus</button>
        </div>

        <div class="panel">
            <h2 class="panel-title">Host</h2>
            <div class="host-row">
                <input id="hostInput" class="host-input" type="text" placeholder="192.168.1.44">
                <button class="btn" onclick="saveHost()">Enregistrer host</button>
            </div>
            <div id="currentHost" class="muted">Host actuel: ...</div>
            <div id="hostStatus" class="status"></div>
        </div>

        <div class="panel">
            <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;">
                <h2 class="panel-title" style="margin:0;">Albums</h2>
                <button class="btn-secondary" onclick="loadAlbums()">Rafraîchir</button>
            </div>
            <div class="muted">Liste des albums avec nombre de vidéos.</div>
            <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
                <input id="newAlbumInput" class="album-input" type="text" placeholder="Nouvel album">
                <button class="btn" onclick="addAlbum()">Ajouter</button>
            </div>
            <div style="margin-top:10px; overflow:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Album</th>
                            <th>Nombre de vidéos</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="albumRows"></tbody>
                </table>
            </div>
            <div id="albumStatus" class="status"></div>
        </div>
    </div>
</div>

<script>
    async function checkAuthentication() {
        try {
            const res = await fetch('/api/config/auth/check');
            const isAuthenticated = await res.json();
            if (!isAuthenticated) {
                window.location.href = '/login';
            }
        } catch (e) {
            window.location.href = '/login';
        }
    }

    async function logout() {
        if (confirm('Êtes-vous sûr de vouloir vous déconnecter ?')) {
            await fetch('/api/config/logout');
            window.location.href = '/login';
        }
    }

    async function loadHost() {
        const status = document.getElementById('hostStatus');
        try {
            const host = await fetch('/api/config/host').then(r => r.text());
            document.getElementById('hostInput').value = host || '';
            document.getElementById('currentHost').textContent = `Host actuel: ${host || 'non défini'}`;
            status.textContent = '';
        } catch (e) {
            status.textContent = 'Erreur lors du chargement du host.';
        }
    }

    async function saveHost() {
        const status = document.getElementById('hostStatus');
        const host = document.getElementById('hostInput').value.trim();
        if (!host) {
            status.textContent = 'Veuillez saisir un host.';
            return;
        }

        try {
            await fetch(`/api/config/host/set?host=${encodeURIComponent(host)}`);
            status.textContent = 'Host mis à jour.';
            await loadHost();
        } catch (e) {
            status.textContent = 'Erreur lors de la mise à jour du host.';
        }
    }

    async function loadAlbums() {
        const rows = document.getElementById('albumRows');
        const status = document.getElementById('albumStatus');
        rows.innerHTML = '';
        try {
            const stats = await fetch('/api/videos/albums/stats').then(r => r.json());
            if (!stats || stats.length === 0) {
                rows.innerHTML = '<tr><td colspan="3" class="muted">Aucun album.</td></tr>';
                status.textContent = '';
                return;
            }

            stats
                .sort((a, b) => String(a.album || '').localeCompare(String(b.album || '')))
                .forEach(item => {
                    const tr = document.createElement('tr');
                    const name = item.album || '';
                    const count = item.count != null ? item.count : '';
                    tr.innerHTML = `
                        <td>${name}</td>
                        <td>${count}</td>
                        <td>
                            <div class="album-actions">
                                <button class="btn-secondary" onclick="renameAlbum('${name.replace(/'/g, "\\'")}')">Modifier</button>
                                <button class="btn-secondary" onclick="deleteAlbum('${name.replace(/'/g, "\\'")}')">Supprimer</button>
                            </div>
                        </td>
                    `;
                    rows.appendChild(tr);
                });
            status.textContent = '';
        } catch (e) {
            status.textContent = 'Erreur lors du chargement des albums.';
        }
    }

    async function addAlbum() {
        const status = document.getElementById('albumStatus');
        const input = document.getElementById('newAlbumInput');
        const name = input.value.trim();
        if (!name) {
            status.textContent = 'Saisissez un nom d\'album.';
            return;
        }

        try {
            const res = await fetch(`/api/videos/albums/add?name=${encodeURIComponent(name)}`, { method: 'POST' });
            const msg = await res.text();
            if (!res.ok) {
                status.textContent = msg || 'Erreur ajout album.';
                return;
            }
            input.value = '';
            status.textContent = 'Album ajouté.';
            await loadAlbums();
        } catch (e) {
            status.textContent = 'Erreur ajout album.';
        }
    }

    async function renameAlbum(currentName) {
        const status = document.getElementById('albumStatus');
        const newName = prompt('Nouveau nom pour l\'album :', currentName);
        if (!newName) return;
        const trimmed = newName.trim();
        if (!trimmed) return;

        try {
            const res = await fetch(`/api/videos/albums/rename?oldName=${encodeURIComponent(currentName)}&newName=${encodeURIComponent(trimmed)}`, { method: 'POST' });
            const msg = await res.text();
            if (!res.ok) {
                status.textContent = msg || 'Erreur renommage album.';
                return;
            }
            status.textContent = 'Album modifié.';
            await loadAlbums();
        } catch (e) {
            status.textContent = 'Erreur renommage album.';
        }
    }

    async function deleteAlbum(name) {
        const status = document.getElementById('albumStatus');
        if (!confirm(`Supprimer l\'album "${name}" ? Les vidéos seront conservées.`)) return;

        try {
            const res = await fetch(`/api/videos/albums?name=${encodeURIComponent(name)}`, { method: 'DELETE' });
            const msg = await res.text();
            if (!res.ok) {
                status.textContent = msg || 'Erreur suppression album.';
                return;
            }
            status.textContent = 'Album supprimé.';
            await loadAlbums();
        } catch (e) {
            status.textContent = 'Erreur suppression album.';
        }
    }

    window.addEventListener('load', async () => {
        await checkAuthentication();
        await loadHost();
        await loadAlbums();
    });
</script>
</body>
</html>
