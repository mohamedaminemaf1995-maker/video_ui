<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Favoris - Video Library</title>
    <style>
        /* Minimal styles copied from index for consistent look */
        * { box-sizing: border-box; }
        body { margin:0; font-family:Arial, sans-serif; background:#0b0b0b; color:white; }
        .container { padding:16px; }
        .top-row { display:flex; gap:8px; align-items:center; margin-bottom:12px; }
        .btn-secondary { padding:8px 12px; border-radius:8px; border:1px solid #3a3a3a; background:#222; color:white; cursor:pointer; }
        .page-title { font-size:22px; margin:0 0 8px 0; }
        .video-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:16px; }
        .video-card { background:#181818; border-radius:12px; overflow:hidden; border:1px solid #262626; }
        .video-player { width:100%; height:160px; object-fit:cover; cursor:pointer; }
        .video-info { padding:10px; }
        .video-title { font-weight:bold; font-size:14px; margin-bottom:6px; }
        .video-meta { font-size:12px; color:#aaa; }
        .favorite-icon { position:absolute; top:8px; left:8px; width:34px; height:34px; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.6); border-radius:8px; font-size:18px; cursor:pointer; }
        .favorite-active { color:red; }
        .video-duration { position:absolute; bottom:6px; right:6px; background:rgba(0,0,0,0.75); color:white; padding:3px 6px; border-radius:6px; font-weight:600; }
        .player-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-row">
        <button class="btn-secondary" onclick="location.href='/'">Bibliothèque</button>
        <h1 class="page-title">Favoris</h1>
    </div>

    <div id="videoCount" style="margin-bottom:8px;color:#9ca3af;">0 vidéo(s)</div>
    <div id="videos" class="video-grid"></div>
</div>

<div id="playerModal" class="player-modal">
    <div style="width:82%; max-width:1100px; background:#111; border-radius:12px; overflow:hidden;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; padding:12px 16px; background:#1b1b1b; gap:16px;">
            <div style="flex:1;">
                <div id="playerTitle" style="font-weight:bold; margin-bottom:10px;">Lecture vidéo</div>
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
                <button id="prevBtn" onclick="playPrevious()" style="background:#333;color:white;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;">⏮ Prev</button>
                <button id="nextBtn" onclick="playNext()" style="background:#333;color:white;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;">Next ⏭</button>
                <button onclick="closePlayer()" style="background:#333;color:white;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;">Fermer</button>
            </div>
        </div>
        <video id="mainPlayer" controls autoplay style="width:100%; max-height:75vh; background:black;"></video>
    </div>
</div>

<script>
    let currentVideos = [];
    let currentIndex = -1;

    async function fetchJson(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
    }

    function formatDuration(ms) {
        if (!ms) return '';
        const totalSeconds = Math.floor(ms / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        if (hours > 0) return `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
        return `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
    }

    function renderVideos(videos) {
        currentVideos = videos || [];
        currentIndex = -1;
        const container = document.getElementById('videos');
        const countBox = document.getElementById('videoCount');
        container.innerHTML = '';
        countBox.textContent = currentVideos.length + ' vidéo(s)';
        if (!currentVideos.length) { container.innerHTML = '<div style="color:#9ca3af;padding:24px 8px;">Aucun favori.</div>'; return; }

        currentVideos.forEach((v, index) => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.style.position = 'relative';
            card.innerHTML = `
    <img alt="thumbnail" src="/api/videos/thumbnail?id=${v.id}" class="video-player" onclick="openPlayerByIndex(${index})" />
    <div class="favorite-icon ${v.favorite ? 'favorite-active' : ''}" onclick="toggleFavorite(event, ${v.id}, this)">♥</div>
    <div class="video-duration">${formatDuration(v.durationMs)}</div>
    <div class="video-info">
        <div class="video-title">${v.title ?? ''}</div>
        <div class="video-meta">${(v.creator ?? 'Unknown')} ${v.album ? '• ' + v.album : ''}</div>
    </div>`;
            container.appendChild(card);
        });
    }

    async function loadFavorites() {
        try {
            const videos = await fetchJson('/api/videos/favorites');
            renderVideos(videos);
        } catch (e) {
            console.error(e);
        }
    }

    async function toggleFavorite(event, id, element) {
        event.stopPropagation();
        await fetch(`/api/videos/favorite/toggle?id=${id}`);
        // remove the card when un-favorited
        if (element.classList.contains('favorite-active')) {
            element.classList.remove('favorite-active');
        } else {
            element.classList.add('favorite-active');
        }
        // reload favorites to reflect order/removal
        await loadFavorites();
    }

    function openPlayerByIndex(index) {
        if (!currentVideos || index < 0 || index >= currentVideos.length) return;
        currentIndex = index;
        const video = currentVideos[index];
        document.getElementById('playerTitle').textContent = video.title || 'Lecture vidéo';
        document.getElementById('mainPlayer').src = video.url || '';
        document.getElementById('playerModal').style.display = 'flex';
    }
    function closePlayer() { const p = document.getElementById('mainPlayer'); p.pause(); p.src=''; document.getElementById('playerModal').style.display='none'; }
    function playNext() { if (!currentVideos || currentVideos.length===0) return; const next=(currentIndex+1)%currentVideos.length; openPlayerByIndex(next); }
    function playPrevious() { if (!currentVideos || currentVideos.length===0) return; const prev=(currentIndex-1+currentVideos.length)%currentVideos.length; openPlayerByIndex(prev); }

    window.addEventListener('load', async () => { await loadFavorites(); });
</script>
</body>
</html>
