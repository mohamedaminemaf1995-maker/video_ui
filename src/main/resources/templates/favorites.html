<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Favoris - Video Library</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg: #05070a;
            --panel: #0f172a;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --blue: #3b82f6;
            --blue-dark: #1d4ed8;
            --border: rgba(59,130,246,0.25);
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at 20% 10%, rgba(14,165,233,0.06), transparent 45%), linear-gradient(180deg, #04050a 0%, #050912 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            padding: 18px;
        }

        .top-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }

        .btn-secondary {
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid rgba(148,163,184,0.35);
            background: rgba(15,23,42,0.8);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background: rgba(15,23,42,0.95);
        }

        .btn {
            padding: 8px 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(59,130,246,0.25);
        }

        .btn:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            transform: translateY(-1px);
        }

        .page-title {
            font-size: 26px;
            margin: 0;
            color: #dbeafe;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
        }

        .video-card {
            background: linear-gradient(145deg, #0b1225, #0f172a);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
            position: relative;
        }

        .video-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 32px rgba(29,78,216,0.35);
            border-color: rgba(59,130,246,0.7);
        }

        .video-player {
            width: 100%;
            height: 170px;
            object-fit: cover;
            cursor: pointer;
            background: #000;
        }

        .video-info {
            padding: 12px;
        }

        .video-title {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 6px;
            color: #e0f2fe;
        }

        .video-meta {
            font-size: 12px;
            color: #a5b4fc;
        }

        .favorite-icon {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15,23,42,0.8);
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            color: #e2e8f0;
            transition: transform 0.2s ease;
        }

        .favorite-icon:hover {
            transform: scale(1.1);
            background: rgba(14,165,233,0.6);
        }

        .favorite-active {
            color: #f43f5e;
        }

        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 3px 6px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
        }

        .player-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        #videoCount {
            margin-bottom: 8px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-row">
        <button class="btn-secondary" onclick="location.href='/'">Bibliothèque</button>
        <h1 class="page-title">Mes Favoris</h1>
        <button onclick="logout()" title="Déconnexion" style="margin-left:auto; background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.4); color:#fca5a5; border-radius:6px; padding:6px 12px; cursor:pointer; font-size:12px; font-weight:600; transition:all 0.2s ease;" onmouseover="this.style.background='rgba(239,68,68,0.3)'" onmouseout="this.style.background='rgba(239,68,68,0.2)'">Déconnexion</button>
    </div>

    <div style="display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;">
        <button class="btn-secondary" onclick="selectAllVisible()" style="font-size:12px; padding:6px 10px;">Tout sél.</button>
        <button class="btn-secondary" onclick="selectNone()" style="font-size:12px; padding:6px 10px;">Annuler</button>
        <button class="btn" onclick="exportM3U()" style="font-size:12px; padding:6px 10px;">Exporter M3U</button>
        <div id="selectionCount" style="font-size:12px; color:#93c5fd; padding:6px 10px;"></div>
        <div id="statusMsg" style="font-size:12px; color:#93c5fd; margin-left:auto;"></div>
    </div>

    <div id="videoCount" style="margin-bottom:8px;color:#9ca3af;">0 vidéo(s)</div>
    <div id="videos" class="video-grid"></div>
</div>

<div id="playerModal" class="player-modal">
    <div style="width:82%; max-width:1100px; background:linear-gradient(135deg, #0b1225, #0f172a); border-radius:16px; overflow:hidden; border:1px solid rgba(59,130,246,0.3);">
        <!-- Modal Header -->
        <div style="padding:20px 24px; background:linear-gradient(90deg, #0c1429, #132a4a); border-bottom:1px solid rgba(59,130,246,0.2);">
            <div style="display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;">
                <div style="flex:1; min-width:250px;">
                    <h3 id="playerTitle" style="margin:0 0 8px 0; font-size:22px; font-weight:700; color:#dbeafe;">Lecture vidéo</h3>
                    <div id="playerSubtitle" style="font-size:13px; color:#94a3b8;">Cliquez sur les contrôles ou utilisez les flèches ↔ et PageUp/PageDown</div>
                </div>
                <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                    <div style="display:flex; align-items:center; gap:6px; background:rgba(59,130,246,0.15); padding:6px 12px; border-radius:8px; border:1px solid rgba(59,130,246,0.2);">
                        <span style="font-size:12px; color:#94a3b8;">Favoris:</span>
                        <strong id="playerFavoriteState" style="color:#60a5fa;">Non</strong>
                    </div>
                    <div style="display:flex; align-items:center; gap:6px; background:rgba(59,130,246,0.15); padding:6px 12px; border-radius:8px; border:1px solid rgba(59,130,246,0.2);">
                        <span style="font-size:12px; color:#94a3b8;" id="playerDuration">00:00 / 00:00</span>
                    </div>
                </div>
            </div>

            <!-- Edit Section: Albums et Level - Une ligne compacte -->
            <div style="margin-top:12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:10px 12px; background:rgba(15,23,42,0.8); border:1px solid rgba(148,163,184,0.2); border-radius:10px;">
                <!-- Albums Horizontal Compact -->
                <label style="font-size:11px; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.05em; margin:0;">Albums:</label>
                <div id="albumCheckboxesContainer" style="display:flex; flex-direction:row; flex-wrap:wrap; gap:6px; align-items:center;">
                </div>

                <!-- Level Horizontal Compact -->
                <label style="font-size:11px; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.05em; margin:0 0 0 8px;">Niveau:</label>
                <select id="levelSelect" style="background:rgba(11,17,36,0.8); color:#e0f2fe; border:1px solid rgba(59,130,246,0.3); border-radius:6px; padding:4px 8px; font-size:12px; cursor:pointer; transition:all 0.2s ease; height:28px;">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                <span id="levelValue" style="font-weight:700; color:#60a5fa; font-size:12px; min-width:15px; text-align:center;">0</span>
                <!-- Save Button Icon Only - Small -->
                <button onclick="saveModalCombined()" title="Enregistrer" style="background:linear-gradient(135deg, #3b82f6, #2563eb); color:white; border:none; padding:4px 8px; border-radius:6px; cursor:pointer; font-size:14px; transition:all 0.2s ease; box-shadow:0 2px 6px rgba(59,130,246,0.25); display:flex; align-items:center; justify-content:center; height:28px; width:28px;" onmouseover="this.style.background='linear-gradient(135deg, #2563eb, #1d4ed8)';this.style.transform='scale(1.05)'" onmouseout="this.style.background='linear-gradient(135deg, #3b82f6, #2563eb)';this.style.transform='scale(1)'">
                    💾
                </button>
            </div>
        </div>

        <!-- Video Player -->
        <video id="mainPlayer" controls autoplay style="width:100%; max-height:75vh; background:black; display:block;"></video>

        <!-- Modal Footer: Controls -->
        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:linear-gradient(90deg, #0c1429, #132a4a); border-top:1px solid rgba(59,130,246,0.2); gap:6px; flex-wrap:wrap;">
            <!-- Playback Controls -->
            <div style="display:flex; gap:4px; align-items:center;">
                <button id="prevBtn" onclick="playPrevious()" title="Précédent" style="background:linear-gradient(135deg, #3b82f6, #2563eb); color:white; border:none; padding:4px 6px; border-radius:5px; cursor:pointer; font-weight:600; font-size:11px; transition:all 0.2s ease; box-shadow:0 1px 4px rgba(59,130,246,0.25);" onmouseover="this.style.background='linear-gradient(135deg, #2563eb, #1d4ed8)';this.style.transform='scale(1.05)'" onmouseout="this.style.background='linear-gradient(135deg, #3b82f6, #2563eb)';this.style.transform='scale(1)'">
                    ⏮
                </button>
                <button onclick="seekBy(-10)" title="-10s" style="background:linear-gradient(135deg, #3b82f6, #2563eb); color:white; border:none; padding:4px 6px; border-radius:5px; cursor:pointer; font-weight:600; font-size:11px; transition:all 0.2s ease; box-shadow:0 1px 4px rgba(59,130,246,0.25);" onmouseover="this.style.background='linear-gradient(135deg, #2563eb, #1d4ed8)';this.style.transform='scale(1.05)'" onmouseout="this.style.background='linear-gradient(135deg, #3b82f6, #2563eb)';this.style.transform='scale(1)'">
                    ◀
                </button>
                <button onclick="playOrPause()" id="playPauseBtn" title="Play/Pause" style="background:linear-gradient(135deg, #3b82f6, #2563eb); color:white; border:none; padding:4px 7px; border-radius:5px; cursor:pointer; font-weight:700; font-size:12px; transition:all 0.2s ease; box-shadow:0 1px 4px rgba(59,130,246,0.25);" onmouseover="this.style.background='linear-gradient(135deg, #2563eb, #1d4ed8)';this.style.transform='scale(1.05)'" onmouseout="this.style.background='linear-gradient(135deg, #3b82f6, #2563eb)';this.style.transform='scale(1)'">
                    ▶
                </button>
                <button onclick="seekBy(10)" title="+10s" style="background:linear-gradient(135deg, #3b82f6, #2563eb); color:white; border:none; padding:4px 6px; border-radius:5px; cursor:pointer; font-weight:600; font-size:11px; transition:all 0.2s ease; box-shadow:0 1px 4px rgba(59,130,246,0.25);" onmouseover="this.style.background='linear-gradient(135deg, #2563eb, #1d4ed8)';this.style.transform='scale(1.05)'" onmouseout="this.style.background='linear-gradient(135deg, #3b82f6, #2563eb)';this.style.transform='scale(1)'">
                    ▶️
                </button>
                <button id="nextBtn" onclick="playNext()" title="Suivant" style="background:linear-gradient(135deg, #3b82f6, #2563eb); color:white; border:none; padding:4px 6px; border-radius:5px; cursor:pointer; font-weight:600; font-size:11px; transition:all 0.2s ease; box-shadow:0 1px 4px rgba(59,130,246,0.25);" onmouseover="this.style.background='linear-gradient(135deg, #2563eb, #1d4ed8)';this.style.transform='scale(1.05)'" onmouseout="this.style.background='linear-gradient(135deg, #3b82f6, #2563eb)';this.style.transform='scale(1)'">
                    ⏭
                </button>
            </div>

            <!-- Action Buttons -->
            <div style="display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end;">
                <button id="favoriteModalBtn" onclick="toggleFavoriteModal(currentVideos[currentIndex]?.id, this)" title="Favori" style="background:linear-gradient(135deg, #ec4899, #db2777); color:white; border:none; padding:4px 6px; border-radius:5px; cursor:pointer; font-weight:600; font-size:12px; transition:all 0.2s ease; box-shadow:0 1px 4px rgba(236,72,153,0.25);" onmouseover="this.style.background='linear-gradient(135deg, #db2777, #be185d)';this.style.transform='scale(1.05)'" onmouseout="this.style.background='linear-gradient(135deg, #ec4899, #db2777)';this.style.transform='scale(1)'">
                    ♥
                </button>
                <button onclick="closePlayer()" title="Fermer" style="background:linear-gradient(135deg, #3b82f6, #2563eb); color:white; border:none; padding:4px 6px; border-radius:5px; cursor:pointer; font-weight:600; font-size:11px; transition:all 0.2s ease; box-shadow:0 1px 4px rgba(59,130,246,0.25);" onmouseover="this.style.background='linear-gradient(135deg, #2563eb, #1d4ed8)';this.style.transform='scale(1.05)'" onmouseout="this.style.background='linear-gradient(135deg, #3b82f6, #2563eb)';this.style.transform='scale(1)'">
                    ✕
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentVideos = [];
    let currentIndex = -1;
    let selectedVideoIds = new Set();

    async function fetchJson(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
    }

    function formatDuration(ms) {
        if (!ms) return '';
        const totalSeconds = Math.floor(ms / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        if (hours > 0) return `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
        return `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
    }

    function setStatus(message) {
        const statusEl = document.getElementById('statusMsg');
        if (statusEl) {
            statusEl.textContent = message || '';
        }
    }

    function findIndexByVideoId(id) {
        if (!currentVideos || currentVideos.length === 0) return -1;
        return currentVideos.findIndex(v => v.id === id);
    }

    async function toggleFavoriteModal(videoId, button) {
        const video = currentVideos.find(v => v.id === videoId);
        if (!video) return;

        await fetch(`/api/videos/favorite/toggle?id=${videoId}`);

        video.favorite = !video.favorite;
        button.classList.toggle('favorite-active');
        document.getElementById('playerFavoriteState').textContent = video.favorite ? 'Oui' : 'Non';
    }

    async function saveModalCombined() {
        if (currentIndex < 0 || !currentVideos[currentIndex]) return;

        const video = currentVideos[currentIndex];

        const container = document.getElementById('albumCheckboxesContainer');
        const selectedAlbums = Array.from(container.querySelectorAll('input[type="checkbox"]'))
            .filter(cb => cb.checked)
            .map(cb => cb.value.trim())
            .filter(Boolean);

        const newLevel = parseInt(document.getElementById('levelSelect').value, 10);
        const payload = {};
        if (selectedAlbums.length) payload.albums = selectedAlbums;
        if (!Number.isNaN(newLevel)) payload.sourceIndex = Math.max(0, Math.min(5, newLevel));

        if (Object.keys(payload).length === 0) return;

        const res = await fetch('/api/videos/' + encodeURIComponent(video.id), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!res.ok) {
            console.error('Erreur update modal', res.status, await res.text());
            setStatus('Erreur sauvegarde');
            return;
        }

        const updated = await res.json();

        const idx = findIndexByVideoId(updated.id);
        if (idx >= 0) currentVideos[idx] = updated;

        await loadFavorites();
        const newIndex = findIndexByVideoId(updated.id);
        if (newIndex >= 0) openPlayerByIndex(newIndex);
        setStatus('Modification enregistrée');
    }

    function renderVideos(videos) {
        currentVideos = videos || [];
        currentIndex = -1;
        const container = document.getElementById('videos');
        const countBox = document.getElementById('videoCount');
        container.innerHTML = '';
        countBox.textContent = currentVideos.length + ' vidéo(s)';
        if (!currentVideos.length) { container.innerHTML = '<div style="color:#9ca3af;padding:24px 8px;">Aucun favori.</div>'; return; }

        currentVideos.forEach((v, index) => {
            const card = document.createElement('div');
            card.className = 'video-card';
            // expose id for drag & drop ordering
            card.dataset.id = v.id;
            card.style.position = 'relative';
            card.innerHTML = `
    <input type="checkbox" class="video-checkbox" data-id="${v.id}" style="position:absolute; top:8px; right:8px; width:20px; height:20px; cursor:pointer; z-index:10;" onchange="toggleVideoSelection(${v.id}, this.checked)" />
    <img alt="thumbnail" src="/api/videos/thumbnail?id=${v.id}" class="video-player" onclick="openPlayerByIndex(${index})" />
    <div class="favorite-icon ${v.favorite ? 'favorite-active' : ''}" onclick="toggleFavorite(event, ${v.id}, this)">♥</div>
    <div class="video-duration">${formatDuration(v.durationMs)}</div>
    <div class="video-info">
        <div class="video-title">${v.title ?? ''}</div>
        <div class="video-meta">${(v.creator ?? 'Unknown')} ${(v.album) ? '• ' + v.album : ''}</div>
    </div>`;
            container.appendChild(card);
        });
        // Re-init sortable after rendering
        initSortable();
    }

    async function loadFavorites() {
        try {
            const videos = await fetchJson('/api/videos/favorites');
            renderVideos(videos);
        } catch (e) {
            console.error(e);
        }
    }

    async function toggleFavorite(event, id, element) {
        event.stopPropagation();
        await fetch(`/api/videos/favorite/toggle?id=${id}`);
        if (element.classList.contains('favorite-active')) {
            element.classList.remove('favorite-active');
        } else {
            element.classList.add('favorite-active');
        }
        await loadFavorites();
    }

    function toggleVideoSelection(videoId, isChecked) {
        if (isChecked) {
            selectedVideoIds.add(videoId);
        } else {
            selectedVideoIds.delete(videoId);
        }
        updateSelectionCount();
    }

    function selectAllVisible() {
        currentVideos.forEach(v => selectedVideoIds.add(v.id));
        document.querySelectorAll('.video-checkbox').forEach(cb => cb.checked = true);
        updateSelectionCount();
    }

    function selectNone() {
        selectedVideoIds.clear();
        document.querySelectorAll('.video-checkbox').forEach(cb => cb.checked = false);
        updateSelectionCount();
    }

    function updateSelectionCount() {
        const count = selectedVideoIds.size;
        const countEl = document.getElementById('selectionCount');
        if (countEl) {
            countEl.textContent = count > 0 ? `${count} sélectionné(s)` : '';
        }
    }

    async function exportM3U() {
        if (selectedVideoIds.size === 0) {
            setStatus('Veuillez sélectionner au moins une vidéo.');
            return;
        }

        const selectedVideos = currentVideos.filter(v => selectedVideoIds.has(v.id));
        
        let m3uContent = '#EXTM3U\n';
        selectedVideos.forEach(v => {
            m3uContent += `#EXTINF:${Math.floor((v.durationMs || 0) / 1000)},${v.title || 'Vidéo'}\n`;
            m3uContent += `${v.url}\n`;
        });

        const blob = new Blob([m3uContent], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `arcad_favoris_${new Date().getTime()}.m3u`;
        a.click();
        URL.revokeObjectURL(url);
        
        setStatus(`Playlist M3U exportée (${selectedVideos.length} vidéo(s)).`);
    }

    function openPlayerByIndex(index) {
        if (!currentVideos || index < 0 || index >= currentVideos.length) return;
        currentIndex = index;
        const video = currentVideos[index];
        
        document.getElementById('playerTitle').textContent = video.title || 'Lecture vidéo';
        document.getElementById('playerSubtitle').textContent = `Créateur: ${video.creator || 'Unknown'} • Level: ${video.sourceIndex ?? 'N/A'} • Albums: ${Array.isArray(video.albums) && video.albums.length > 0 ? video.albums.join(', ') : 'Aucun'}`;
        document.getElementById('playerDuration').textContent = `${formatDuration(video.durationMs)} / ${formatDuration(video.durationMs || 0)}`;
        document.getElementById('playerFavoriteState').textContent = video.favorite ? 'Oui' : 'Non';

        document.getElementById('mainPlayer').src = video.url || '';
        document.getElementById('playerModal').style.display = 'flex';

        // Build album checkboxes
        const videoAlbums = Array.isArray(video.albums) ? video.albums : [];
        const container = document.getElementById('albumCheckboxesContainer');
        container.innerHTML = '';

        // Get all albums from API or from filter if available
        // Since we don't have a global album list in favorites, we'll create checkboxes dynamically
        // For now, we'll use empty container and fetch albums if needed
        
        // For favorites page, we need to get the list of all albums
        const allAlbums = getAllAlbums();
        if (allAlbums && allAlbums.length > 0) {
            allAlbums.forEach(album => {
                const label = document.createElement('label');
                label.style.display = 'flex';
                label.style.alignItems = 'center';
                label.style.gap = '4px';
                label.style.cursor = 'pointer';
                label.style.color = '#e0f2fe';
                label.style.fontSize = '11px';
                label.style.padding = '3px 8px';
                label.style.background = 'rgba(59,130,246,0.25)';
                label.style.border = '1px solid rgba(59,130,246,0.4)';
                label.style.borderRadius = '5px';
                label.style.whiteSpace = 'nowrap';
                label.style.transition = 'all 0.2s ease';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = album;
                checkbox.checked = videoAlbums.includes(album);
                checkbox.style.cursor = 'pointer';
                checkbox.style.width = '14px';
                checkbox.style.height = '14px';

                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(album));
                label.addEventListener('mouseenter', () => {
                    label.style.background = 'rgba(59,130,246,0.4)';
                    label.style.borderColor = 'rgba(59,130,246,0.6)';
                });
                label.addEventListener('mouseleave', () => {
                    label.style.background = 'rgba(59,130,246,0.25)';
                    label.style.borderColor = 'rgba(59,130,246,0.4)';
                });
                container.appendChild(label);
            });
        }

        const level = (video.sourceIndex != null && video.sourceIndex >= 1 && video.sourceIndex <= 5) ? video.sourceIndex : 1;
        document.getElementById('levelSelect').value = level;
        document.getElementById('levelValue').textContent = video.sourceIndex ?? 0;
    }

    function getAllAlbums() {
        // Extract unique albums from current videos
        const albums = new Set();
        currentVideos.forEach(v => {
            if (Array.isArray(v.albums)) {
                v.albums.forEach(a => albums.add(a));
            }
        });
        return Array.from(albums).sort();
    }

    function seekBy(seconds) {
        const player = document.getElementById('mainPlayer');
        if (!player || isNaN(player.currentTime)) return;
        const target = Math.max(0, Math.min(player.duration || Infinity, player.currentTime + seconds));
        player.currentTime = target;
        setStatus(`Position vidéo : ${Math.round(target)}s`);
    }

    function playOrPause() {
        const player = document.getElementById('mainPlayer');
        if (!player) return;
        if (player.paused || player.ended) {
            player.play();
        } else {
            player.pause();
        }
    }

    function initPlayerEvents() {
        const player = document.getElementById('mainPlayer');

        player.addEventListener('ended', () => {
            if (currentIndex < currentVideos.length - 1) {
                playNext();
            }
        });

        player.addEventListener('play', () => {
            const btn = document.getElementById('playPauseBtn');
            if (btn) btn.textContent = '⏸';
        });

        player.addEventListener('pause', () => {
            const btn = document.getElementById('playPauseBtn');
            if (btn) btn.textContent = '▶';
        });
    }

    function closePlayer() { 
        const p = document.getElementById('mainPlayer'); 
        p.pause(); 
        p.src=''; 
        document.getElementById('playerModal').style.display='none'; 
        currentIndex = -1;
    }
    
    function playNext() { 
        if (!currentVideos || currentVideos.length===0) return; 
        const next=(currentIndex+1)%currentVideos.length; 
        openPlayerByIndex(next); 
    }
    
    function playPrevious() { 
        if (!currentVideos || currentVideos.length===0) return; 
        const prev=(currentIndex-1+currentVideos.length)%currentVideos.length; 
        openPlayerByIndex(prev); 
    }

    async function checkAuthentication() {
        try {
            const res = await fetch('/api/config/auth/check');
            const isAuthenticated = await res.json();
            if (!isAuthenticated) {
                window.location.href = '/login';
            }
        } catch (e) {
            console.error('Erreur vérification auth:', e);
            window.location.href = '/login';
        }
    }

    async function logout() {
        if (confirm('Êtes-vous sûr de vouloir vous déconnecter ?')) {
            try {
                await fetch('/api/config/logout');
                window.location.href = '/login';
            } catch (e) {
                console.error('Erreur logout:', e);
            }
        }
    }

    window.addEventListener('load', async () => { 
        await checkAuthentication();
        initPlayerEvents();
        await loadFavorites(); 
    });

    // Keyboard shortcuts for player modal
    document.addEventListener('keydown', (e) => {
        const modalVisible = document.getElementById('playerModal').style.display === 'flex';
        if (!modalVisible) return;

        if (e.key === 'PageDown') {
            playNext();
        } else if (e.key === 'PageUp') {
            playPrevious();
        } else if (e.key === 'ArrowRight') {
            seekBy(10);
        } else if (e.key === 'ArrowLeft') {
            seekBy(-10);
        } else if (e.key === 'Escape') {
            closePlayer();
        }
    });

    // Initialize SortableJS for drag & drop reordering
    function initSortable() {
        const el = document.getElementById('videos');
        if (!el) return;
        // destroy previous instance if any
        if (window._sortableInstance && typeof window._sortableInstance.destroy === 'function') {
            try { window._sortableInstance.destroy(); } catch (e) { /* ignore */ }
        }

        // create new sortable
        window._sortableInstance = Sortable.create(el, {
            animation: 150,
            handle: '.video-card',
            onEnd: async function () {
                const ids = Array.from(el.children).map(ch => Number(ch.dataset.id)).filter(n => !Number.isNaN(n));
                try {
                    const res = await fetch('/api/videos/favorites/reorder', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(ids)
                    });
                    if (!res.ok) {
                        setStatus('Erreur enregistrement ordre');
                        console.error(await res.text());
                    } else {
                        setStatus('Ordre enregistré');
                    }
                } catch (e) {
                    console.error(e);
                    setStatus('Erreur enregistrement ordre');
                }
            }
        });
    }

    // Load SortableJS from CDN (if not already loaded)
    (function loadSortableOnce(){
        if (window.Sortable) return;
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js';
        s.onload = () => { initSortable(); };
        document.head.appendChild(s);
    })();
</script>
