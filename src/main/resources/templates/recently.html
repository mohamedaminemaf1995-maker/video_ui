<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Historique - Recently Watched</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg: #05070a;
            --panel: #0f172a;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --blue: #3b82f6;
            --blue-dark: #1d4ed8;
            --border: rgba(59,130,246,0.25);
        }
        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at 20% 10%, rgba(14,165,233,0.06), transparent 45%), linear-gradient(180deg, #04050a 0%, #050912 100%);
            color: var(--text);
            min-height: 100vh;
        }
        .container {
            padding: 18px;
        }
        .top-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }
        .btn-secondary {
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid rgba(148,163,184,0.35);
            background: rgba(15,23,42,0.8);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-secondary:hover {
            background: rgba(15,23,42,0.95);
        }
        .btn {
            padding: 8px 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(59,130,246,0.25);
        }
        .btn:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            transform: translateY(-1px);
        }
        .page-title {
            font-size: 26px;
            margin: 0;
            color: #dbeafe;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
        }
        .video-card {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
            background: #0b1225;
        }
        .video-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 32px rgba(29,78,216,0.35);
            border-color: rgba(59,130,246,0.7);
        }
        .video-thumb {
            width: 100%;
            height: 170px;
            display: block;
            object-fit: cover;
            background: #000;
            cursor: pointer;
        }
        .video-overlay {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            padding: 16px 12px 10px 12px;
            background: linear-gradient(0deg, rgba(15,23,42,0.82) 80%, rgba(15,23,42,0.05) 100%);
            color: #e0f2fe;
            width: 100%;
            z-index: 2;
        }
        .video-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 2px;
            word-break: break-word;
            color: #e0f2fe;
            text-shadow: 0 2px 8px #000a;
        }
        .video-meta {
            font-size: 12px;
            color: #a5b4fc;
            text-shadow: 0 1px 6px #000a;
        }
        .favorite-icon {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15,23,42,0.8);
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            color: #e2e8f0;
            transition: transform 0.2s ease;
        }
        .favorite-icon:hover {
            transform: scale(1.1);
            background: rgba(14,165,233,0.6);
        }
        .favorite-active {
            color: #f43f5e;
        }
        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 3px 6px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
        }
        #videoCount {
            margin-bottom: 8px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" style="padding: 10px 8px; min-width: 220px; width: 220px;">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
            <img src="/2938237.png" alt="icon" style="width:32px; height:32px; border-radius:8px; box-shadow:0 2px 8px #0003;">
            <div>
                <h2 style="margin:0; color:#bfdbfe; font-size:20px;">Arcad</h2>
                <div style="font-size:11px; color:#94a3b8; margin-top:1px;">Dashboard vidéo</div>
            </div>
            <span style="color:#22d3ee; font-weight:bold; margin-left:auto; font-size:13px;">v1</span>
        </div>
    </div>
    <div class="container">
    <div class="top-row">
        <button class="btn-secondary" onclick="location.href='/'">Bibliothèque</button>
        <h1 class="page-title">Historique</h1>
        <button onclick="logout()" title="Déconnexion" style="margin-left:auto; background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.4); color:#fca5a5; border-radius:6px; padding:6px 12px; cursor:pointer; font-size:12px; font-weight:600; transition:all 0.2s ease;" onmouseover="this.style.background='rgba(239,68,68,0.3)'" onmouseout="this.style.background='rgba(239,68,68,0.2)'">Déconnexion</button>
    </div>
    <div id="videoCount" style="margin-bottom:8px;color:#9ca3af;">0 vidéo(s)</div>
    <div id="videos" class="video-grid"></div>
</div>
<script>
    let currentVideos = [];
    let currentIndex = -1;
    function formatDuration(ms) {
        if (!ms) return '';
        const totalSeconds = Math.floor(ms / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        if (hours > 0) return `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
        return `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
    }
    function renderVideos(videos) {
        currentVideos = videos || [];
        const container = document.getElementById('videos');
        const countBox = document.getElementById('videoCount');
        container.innerHTML = '';
        countBox.textContent = currentVideos.length + ' vidéo(s)';
        if (!currentVideos.length) { container.innerHTML = '<div style="color:#9ca3af;padding:24px 8px;">Aucune vidéo récemment regardée.</div>'; return; }
        currentVideos.forEach((v, index) => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <img alt="thumbnail" src="/api/videos/thumbnail?id=${v.id}" class="video-thumb" onclick="openPlayerByIndex(${index})" />
                <div class="video-overlay">
                    <div class="video-title">${v.title ?? ''}</div>
                    <div class="video-meta">${(v.creator ?? 'Unknown')} ${(v.album) ? '• ' + v.album : ''}</div>
                </div>
                <div class="favorite-icon ${v.favorite ? 'favorite-active' : ''}">♥</div>
                <div class="video-duration">${formatDuration(v.durationMs)}</div>
            `;
            container.appendChild(card);
        });
    }
    async function loadRecentlyWatched() {
        try {
            const res = await fetch('/api/videos/recently-watched');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const videos = await res.json();
            renderVideos(videos);
        } catch (e) {
            document.getElementById('videos').innerHTML = '<div style="color:#f87171;">Erreur chargement historique.</div>';
        }
    }
    function logout() {
        if (confirm('Êtes-vous sûr de vouloir vous déconnecter ?')) {
            fetch('/api/config/logout').then(() => window.location.href = '/login');
        }
    }
    window.addEventListener('load', loadRecentlyWatched);
</script>
</body>
</html>
