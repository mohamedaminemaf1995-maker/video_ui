<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidéos récemment vues - Ar44</title>
    <link rel="icon" href="/2938237.png">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0b1225 0%, #1e293b 100%);
            color: #e0e7ef;
        }
        .app {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            background: linear-gradient(135deg, #0b1225 60%, #1e293b 100%);
            box-shadow: 2px 0 16px #0002;
            min-width: 220px;
            width: 220px;
            padding: 10px 8px;
        }
        .container {
            flex: 1;
            padding: 32px 32px 32px 32px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 22px;
        }
        .btn, .btn-secondary {
            border: none;
            border-radius: 8px;
            padding: 8px 18px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s, color 0.18s;
        }
        .btn {
            background: linear-gradient(90deg, #38bdf8, #6366f1);
            color: #fff;
        }
        .btn-secondary {
            background: #1e293b;
            color: #60a5fa;
            border: 1px solid #334155;
        }
        .btn:hover, .btn-secondary:hover {
            background: linear-gradient(90deg, #6366f1, #38bdf8);
            color: #fff;
        }

        .nav-chip-wrap {
            display: grid;
            grid-template-columns: 1fr;
            gap: 7px;
            margin-bottom: 10px;
        }

        .nav-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid rgba(148,163,184,0.32);
            background: rgba(15,23,42,0.72);
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .nav-chip:hover {
            transform: translateX(3px);
            border-color: rgba(56,189,248,0.6);
            background: rgba(30,41,59,0.95);
        }

        .nav-chip.active {
            border-color: rgba(56,189,248,0.8);
            background: linear-gradient(90deg, rgba(56,189,248,0.2), rgba(99,102,241,0.2));
            color: #e0f2fe;
            box-shadow: 0 6px 16px rgba(30,64,175,0.2);
        }
        .video-card {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
            background: #0b1225;
        }
        .video-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 32px rgba(29,78,216,0.35);
            border-color: rgba(59,130,246,0.7);
        }
        .video-thumb {
            width: 100%;
            height: 170px;
            display: block;
            object-fit: cover;
            background: #000;
            cursor: pointer;
        }
        .video-overlay {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            padding: 16px 12px 10px 12px;
            background: linear-gradient(0deg, rgba(15,23,42,0.82) 80%, rgba(15,23,42,0.05) 100%);
            color: #e0f2fe;
            width: 100%;
            z-index: 2;
        }
        .video-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 2px;
            word-break: break-word;
            color: #e0f2fe;
            text-shadow: 0 2px 8px #000a;
        }
        .video-meta {
            font-size: 12px;
            color: #a5b4fc;
            text-shadow: 0 1px 6px #000a;
        }
        .favorite-icon {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15,23,42,0.8);
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            color: #e2e8f0;
            transition: transform 0.2s ease;
        }
        .favorite-icon:hover {
            transform: scale(1.1);
            background: rgba(14,165,233,0.6);
        }
        .favorite-active {
            color: #f43f5e;
        }
        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 3px 6px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
        }
        .player-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        #videoCount {
            margin-bottom: 8px;
            color: #94a3b8;
        }

        .list-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .page-size-select {
            background: rgba(15, 23, 42, 0.9);
            color: #dbeafe;
            border: 1px solid rgba(56, 189, 248, 0.4);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 13px;
        }

        .pagination {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 6px 0 14px;
            flex-wrap: wrap;
        }

        .page-btn {
            border: 1px solid rgba(148,163,184,0.35);
            border-radius: 8px;
            background: rgba(15,23,42,0.78);
            color: #cbd5e1;
            padding: 5px 9px;
            font-size: 12px;
            cursor: pointer;
        }

        .page-btn.active {
            background: linear-gradient(90deg, #38bdf8, #6366f1);
            color: #fff;
            border-color: rgba(56,189,248,0.85);
        }

        .page-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .yt-controls {
            padding: 10px 12px;
            background: linear-gradient(90deg, #0a1020, #12213c);
            border-top: 1px solid rgba(59,130,246,0.28);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .yt-progress-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .yt-time {
            font-size: 12px;
            color: #93c5fd;
            min-width: 42px;
            text-align: center;
        }

        .yt-seek {
            flex: 1;
            accent-color: #0080ff;
            height: 4px;
        }

        .yt-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }

        .yt-actions-left,
        .yt-actions-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .yt-btn {
            background: transparent;
            color: #e2e8f0;
            border: 1px solid rgba(148,163,184,0.45);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .yt-btn:hover {
            transform: translateY(-1px);
            background: rgba(37, 99, 235, 0.22);
        }

        .yt-range {
            width: 92px;
            accent-color: #0080ff;
        }

        .yt-select {
            background: transparent;
            color: #e2e8f0;
            border: 1px solid rgba(148,163,184,0.45);
            border-radius: 7px;
            padding: 5px 8px;
            font-size: 12px;
        }

        .yt-seek-wrap {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
        }

        .seek-preview {
            position: absolute;
            bottom: 18px;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(148,163,184,0.35);
            color: #dbeafe;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 6px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.12s ease;
            white-space: nowrap;
        }

        .seek-preview.visible {
            opacity: 1;
        }

        .player-shell {
            position: relative;
        }

        .buffering-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 46px;
            height: 46px;
            margin-left: -23px;
            margin-top: -23px;
            border: 4px solid rgba(255,255,255,0.25);
            border-top-color: #0080ff;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            display: none;
            z-index: 4;
        }

        .buffering-indicator.show {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .player-shell.theater {
            width: 96% !important;
            max-width: 1500px !important;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:18px;">
            <img src="/2938237.png" alt="icon" style="width:38px; height:38px; border-radius:10px; box-shadow:0 2px 8px #0003;">
            <span style="font-family:'Segoe UI',Arial,sans-serif; font-size:1.7rem; font-weight:800; letter-spacing:0.04em; background:linear-gradient(90deg,#38bdf8,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent; background-clip:text; color:transparent;">Ar44</span>
            <button onclick="logout()" title="Déconnexion" style="margin-left:auto; background:rgba(239,68,68,0.18); border:none; color:#f87171; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; transition:background 0.2s;" onmouseover="this.style.background='rgba(239,68,68,0.32)'" onmouseout="this.style.background='rgba(239,68,68,0.18)'">
                <svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' fill='none' viewBox='0 0 24 24'><path stroke='#f87171' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' d='M17 17L7 7m10 0L7 17'/></svg>
            </button>
        </div>

        <div class="nav-chip-wrap">
            <button class="nav-chip" onclick="location.href='/'">Bibliothèque</button>
            <button class="nav-chip" onclick="location.href='/favorites'">Favoris</button>
            <button class="nav-chip active" onclick="location.href='/recently'">Récemment vus</button>
        </div>
    </div>
    <div class="container">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
            <button class="btn-secondary" onclick="location.href='/'">Bibliothèque</button>
            <button class="btn-secondary" onclick="location.href='/favorites'">Favoris</button>
            <button class="btn-secondary" onclick="location.href='/recently'" style="margin-left:auto;">Récemment vus</button>
        </div>
        <div class="list-controls">
            <div id="videoCount" style="margin-bottom:0;color:#9ca3af;">0 vidéo(s)</div>
            <label style="font-size:13px; color:#cbd5e1; display:flex; align-items:center; gap:8px;">
                Afficher
                <select id="pageSizeSelect" class="page-size-select" onchange="onPageSizeChange()">
                    <option value="20">20</option>
                    <option value="50" selected>50</option>
                    <option value="100">100</option>
                    <option value="200">200</option>
                </select>
            </label>
        </div>
        <div id="pagination" class="pagination"></div>
        <div id="videos" class="video-grid"></div>
    </div>
</div>

<div id="playerModal" class="player-modal">
    <div id="playerShell" class="player-shell" style="width:82%; max-width:1100px; background:linear-gradient(135deg, #0b1225, #0f172a); border-radius:16px; overflow:hidden; border:1px solid rgba(59,130,246,0.3);">
        <div style="padding:20px 24px; background:linear-gradient(90deg, #0c1429, #132a4a); border-bottom:1px solid rgba(59,130,246,0.2);">
            <div style="display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;">
                <div style="flex:1; min-width:250px;">
                    <h3 id="playerTitle" style="margin:0 0 8px 0; font-size:22px; font-weight:700; color:#dbeafe;">Lecture vidéo</h3>
                    <div id="playerSubtitle" style="font-size:13px; color:#94a3b8;">Cliquez sur les contrôles ou utilisez les flèches ↔ et PageUp/PageDown</div>
                </div>
                <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                    <div style="display:flex; align-items:center; gap:6px; background:rgba(59,130,246,0.15); padding:6px 12px; border-radius:8px; border:1px solid rgba(59,130,246,0.2);">
                        <span style="font-size:12px; color:#94a3b8;">Favoris:</span>
                        <strong id="playerFavoriteState" style="color:#60a5fa;">Non</strong>
                    </div>
                    <div style="display:flex; align-items:center; gap:6px; background:rgba(59,130,246,0.15); padding:6px 12px; border-radius:8px; border:1px solid rgba(59,130,246,0.2);">
                        <span style="font-size:12px; color:#94a3b8;" id="playerDuration">00:00 / 00:00</span>
                    </div>
                </div>
            </div>
            <div style="margin-top:12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:10px 12px; background:rgba(15,23,42,0.8); border:1px solid rgba(148,163,184,0.2); border-radius:10px;">
                <label style="font-size:11px; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.05em; margin:0;">Albums:</label>
                <div id="albumCheckboxesContainer" style="display:flex; flex-direction:row; flex-wrap:wrap; gap:6px; align-items:center;"></div>
                <label style="font-size:11px; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.05em; margin:0 0 0 8px;">Niveau:</label>
                <select id="levelSelect" style="background:rgba(11,17,36,0.8); color:#e0f2fe; border:1px solid rgba(59,130,246,0.3); border-radius:6px; padding:4px 8px; font-size:12px; cursor:pointer; transition:all 0.2s ease; height:28px;">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                <span id="levelValue" style="font-weight:700; color:#60a5fa; font-size:12px; min-width:15px; text-align:center;">0</span>
                <button onclick="saveModalCombined()" title="Enregistrer" style="background:linear-gradient(135deg, #3b82f6, #2563eb); color:white; border:none; padding:4px 8px; border-radius:6px; cursor:pointer; font-size:14px; transition:all 0.2s ease; box-shadow:0 2px 6px rgba(59,130,246,0.25); display:flex; align-items:center; justify-content:center; height:28px; width:28px;" onmouseover="this.style.background='linear-gradient(135deg, #2563eb, #1d4ed8)';this.style.transform='scale(1.05)'" onmouseout="this.style.background='linear-gradient(135deg, #3b82f6, #2563eb)';this.style.transform='scale(1)'">
                    💾
                </button>
            </div>
        </div>
        <video id="mainPlayer" autoplay style="width:100%; max-height:75vh; background:black; display:block;"></video>
        <div id="bufferingIndicator" class="buffering-indicator"></div>
        <div class="yt-controls">
            <div class="yt-progress-row">
                <span id="currentTime" class="yt-time">00:00</span>
                <div class="yt-seek-wrap">
                    <input id="seekBar" class="yt-seek" type="range" min="0" max="100" step="0.1" value="0" oninput="onSeekBarInput(this.value)">
                    <span id="seekPreview" class="seek-preview">00:00</span>
                </div>
                <span id="totalTime" class="yt-time">00:00</span>
            </div>
            <div class="yt-actions">
                <div class="yt-actions-left">
                    <button id="playPauseBtn" class="yt-btn" onclick="playOrPause()">▶</button>
                    <button class="yt-btn" onclick="seekBy(-10)">-10s</button>
                    <button class="yt-btn" onclick="seekBy(10)">+10s</button>
                    <button id="prevBtn" class="yt-btn" onclick="playPrevious()">Préc</button>
                    <button id="nextBtn" class="yt-btn" onclick="playNext()">Suiv</button>
                    <button id="muteBtn" class="yt-btn" onclick="toggleMute()">🔊</button>
                    <input id="volumeSlider" class="yt-range" type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)">
                </div>
                <div class="yt-actions-right">
                    <select id="speedSelect" class="yt-select" onchange="changeSpeed(this.value)">
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                    </select>
                    <button id="theaterBtn" class="yt-btn" onclick="toggleTheaterMode()">Théâtre</button>
                    <button id="fullScreenBtn" class="yt-btn" onclick="toggleFullScreen()">Plein écran</button>
                    <button id="favoriteModalBtn" class="yt-btn" onclick="toggleFavoriteModal(currentVideos[currentIndex]?.id, this)">Favori</button>
                    <button class="yt-btn" onclick="closePlayer()">Fermer</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    let currentVideos = [];
    let allVideos = [];
    let currentIndex = -1;
    let currentPage = 1;
    let pageSize = 50;
    async function fetchJson(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
    }
    function formatDuration(ms) {
        if (!ms) return '';
        const totalSeconds = Math.floor(ms / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        if (hours > 0) return `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
        return `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
    }
    function setStatus(message) {}
    function formatClock(seconds) {
        if (!Number.isFinite(seconds)) return '00:00';
        const s = Math.floor(seconds);
        const m = Math.floor(s / 60);
        const r = s % 60;
        return `${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}`;
    }
    function updateTimeline() {
        const player = document.getElementById('mainPlayer');
        const seek = document.getElementById('seekBar');
        const cur = document.getElementById('currentTime');
        const total = document.getElementById('totalTime');
        if (!player || !seek || !cur || !total) return;
        const duration = Number.isFinite(player.duration) ? player.duration : 0;
        const current = Number.isFinite(player.currentTime) ? player.currentTime : 0;
        seek.value = duration > 0 ? (current / duration) * 100 : 0;
        cur.textContent = formatClock(current);
        total.textContent = formatClock(duration);
    }
    function onSeekBarInput(value) {
        const player = document.getElementById('mainPlayer');
        if (!player || !Number.isFinite(player.duration)) return;
        player.currentTime = (Number(value) / 100) * player.duration;
    }
    function updateSeekPreviewFromEvent(event) {
        const seek = document.getElementById('seekBar');
        const preview = document.getElementById('seekPreview');
        const player = document.getElementById('mainPlayer');
        if (!seek || !preview || !player || !Number.isFinite(player.duration)) return;
        const rect = seek.getBoundingClientRect();
        const x = Math.max(0, Math.min(rect.width, event.clientX - rect.left));
        const ratio = rect.width > 0 ? x / rect.width : 0;
        preview.style.left = `${x}px`;
        preview.textContent = formatClock(player.duration * ratio);
        preview.classList.add('visible');
    }
    function hideSeekPreview() {
        const preview = document.getElementById('seekPreview');
        if (preview) preview.classList.remove('visible');
    }
    function setBuffering(active) {
        const indicator = document.getElementById('bufferingIndicator');
        if (!indicator) return;
        indicator.classList.toggle('show', !!active);
    }
    function setVolume(value) {
        const player = document.getElementById('mainPlayer');
        if (!player) return;
        player.volume = Math.max(0, Math.min(1, Number(value)));
        player.muted = player.volume === 0;
        const muteBtn = document.getElementById('muteBtn');
        if (muteBtn) muteBtn.textContent = player.muted ? '🔇' : '🔊';
    }
    function toggleMute() {
        const player = document.getElementById('mainPlayer');
        if (!player) return;
        player.muted = !player.muted;
        const muteBtn = document.getElementById('muteBtn');
        const volume = document.getElementById('volumeSlider');
        if (muteBtn) muteBtn.textContent = player.muted ? '🔇' : '🔊';
        if (volume) volume.value = player.muted ? 0 : player.volume;
    }
    function changeSpeed(value) {
        const player = document.getElementById('mainPlayer');
        if (!player) return;
        player.playbackRate = Number(value) || 1;
    }
    function toggleTheaterMode() {
        const shell = document.getElementById('playerShell');
        if (!shell) return;
        shell.classList.toggle('theater');
    }
    function toggleFullScreen() {
        const video = document.getElementById('mainPlayer');
        if (!video) return;
        if (!document.fullscreenElement) {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    }

    function markVideoAsWatched(videoId) {
        if (!videoId) return;
        fetch(`/api/videos/${videoId}/watched`, { method: 'POST' }).catch(error => {
            console.error('Erreur mise a jour recently watched:', error);
        });
    }

    function getSelectedPageSize() {
        const raw = Number(document.getElementById('pageSizeSelect')?.value || 50);
        return Number.isFinite(raw) && raw > 0 ? raw : 50;
    }

    function renderPagination(totalCount, totalPages) {
        const box = document.getElementById('pagination');
        if (!box) return;
        box.innerHTML = '';
        if (!totalCount || totalPages <= 1) return;

        const prev = document.createElement('button');
        prev.className = 'page-btn';
        prev.textContent = 'Préc';
        prev.disabled = currentPage <= 1;
        prev.onclick = () => goToPage(currentPage - 1);
        box.appendChild(prev);

        const start = Math.max(1, currentPage - 2);
        const end = Math.min(totalPages, currentPage + 2);
        for (let p = start; p <= end; p++) {
            const btn = document.createElement('button');
            btn.className = 'page-btn' + (p === currentPage ? ' active' : '');
            btn.textContent = String(p);
            btn.onclick = () => goToPage(p);
            box.appendChild(btn);
        }

        const next = document.createElement('button');
        next.className = 'page-btn';
        next.textContent = 'Suiv';
        next.disabled = currentPage >= totalPages;
        next.onclick = () => goToPage(currentPage + 1);
        box.appendChild(next);
    }

    function goToPage(page) {
        const totalPages = Math.max(1, Math.ceil((allVideos?.length || 0) / pageSize));
        currentPage = Math.max(1, Math.min(totalPages, page));
        renderVideos(allVideos, true);
    }

    function onPageSizeChange() {
        pageSize = getSelectedPageSize();
        currentPage = 1;
        renderVideos(allVideos, true);
    }

    function findIndexByVideoId(id) {
        if (!allVideos || allVideos.length === 0) return -1;
        return allVideos.findIndex(v => v.id === id);
    }
    async function toggleFavoriteModal(videoId, button) {
        const video = currentVideos.find(v => v.id === videoId);
        if (!video) return;
        await fetch(`/api/videos/favorite/toggle?id=${videoId}`);
        video.favorite = !video.favorite;
        button.classList.toggle('favorite-active');
        document.getElementById('playerFavoriteState').textContent = video.favorite ? 'Oui' : 'Non';
    }
    async function saveModalCombined() {
        if (currentIndex < 0 || !currentVideos[currentIndex]) return;
        const video = currentVideos[currentIndex];
        const container = document.getElementById('albumCheckboxesContainer');
        const selectedAlbums = Array.from(container.querySelectorAll('input[type="checkbox"]'))
            .filter(cb => cb.checked)
            .map(cb => cb.value.trim())
            .filter(Boolean);
        const newLevel = parseInt(document.getElementById('levelSelect').value, 10);
        const payload = {};
        if (selectedAlbums.length) payload.albums = selectedAlbums;
        if (!Number.isNaN(newLevel)) payload.sourceIndex = Math.max(0, Math.min(5, newLevel));
        if (Object.keys(payload).length === 0) return;
        const res = await fetch('/api/videos/' + encodeURIComponent(video.id), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!res.ok) {
            console.error('Erreur update modal', res.status, await res.text());
            return;
        }
        const updated = await res.json();
        const idx = findIndexByVideoId(updated.id);
        if (idx >= 0) allVideos[idx] = updated;
        await loadRecently();
        const newIndex = findIndexByVideoId(updated.id);
        if (newIndex >= 0) {
            pageSize = getSelectedPageSize();
            currentPage = Math.floor(newIndex / pageSize) + 1;
            renderVideos(allVideos, true);
            const pageIndex = currentVideos.findIndex(v => v.id === updated.id);
            if (pageIndex >= 0) openPlayerByIndex(pageIndex);
        }
    }
    function renderVideos(videos, keepPage = false) {
        allVideos = videos || [];
        if (!keepPage) currentPage = 1;
        pageSize = getSelectedPageSize();
        const totalPages = Math.max(1, Math.ceil(allVideos.length / pageSize));
        if (currentPage > totalPages) currentPage = totalPages;
        const start = (currentPage - 1) * pageSize;
        currentVideos = allVideos.slice(start, start + pageSize);
        currentIndex = -1;
        const container = document.getElementById('videos');
        const countBox = document.getElementById('videoCount');
        container.innerHTML = '';
        countBox.textContent = allVideos.length + ' vidéo(s)';
        if (!allVideos.length) {
            renderPagination(0, 1);
            container.innerHTML = '<div style="color:#9ca3af;padding:24px 8px;">Aucune vidéo récemment vue.</div>';
            return;
        }
        currentVideos.forEach((v, index) => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.dataset.id = v.id;
            card.innerHTML = `
                <img alt="thumbnail" src="/api/videos/thumbnail?id=${v.id}" class="video-thumb" onclick="openPlayerByIndex(${index})" />
                <div class="video-overlay">
                    <div class="video-title">${v.title ?? ''}</div>
                    <div class="video-meta">${(v.creator ?? 'Unknown')} ${(v.album) ? '• ' + v.album : ''}</div>
                </div>
                <div class="favorite-icon ${v.favorite ? 'favorite-active' : ''}" onclick="toggleFavorite(event, ${v.id}, this)">♥</div>
                <div class="video-duration">${formatDuration(v.durationMs)}</div>
            `;
            container.appendChild(card);
        });
        renderPagination(allVideos.length, totalPages);
    }
    async function loadRecently() {
        try {
            const videos = await fetchJson('/api/videos/recently-watched');
            renderVideos(videos);
        } catch (e) {
            console.error(e);
        }
    }
    async function toggleFavorite(event, id, element) {
        event.stopPropagation();
        await fetch(`/api/videos/favorite/toggle?id=${id}`);
        if (element.classList.contains('favorite-active')) {
            element.classList.remove('favorite-active');
        } else {
            element.classList.add('favorite-active');
        }
        await loadRecently();
    }
    function openPlayerByIndex(index) {
        if (!currentVideos || index < 0 || index >= currentVideos.length) return;
        currentIndex = index;
        const video = currentVideos[index];
        document.getElementById('playerTitle').textContent = video.title || 'Lecture vidéo';
        document.getElementById('playerSubtitle').textContent = `Créateur: ${video.creator || 'Unknown'} • Level: ${video.sourceIndex ?? 'N/A'} • Albums: ${Array.isArray(video.albums) && video.albums.length > 0 ? video.albums.join(', ') : 'Aucun'}`;
        document.getElementById('playerDuration').textContent = `${formatDuration(video.durationMs)} / ${formatDuration(video.durationMs || 0)}`;
        document.getElementById('playerFavoriteState').textContent = video.favorite ? 'Oui' : 'Non';
        document.getElementById('mainPlayer').src = video.url || '';
        document.getElementById('playerModal').style.display = 'flex';
        markVideoAsWatched(video.id);
        const videoAlbums = Array.isArray(video.albums) ? video.albums : [];
        const container = document.getElementById('albumCheckboxesContainer');
        container.innerHTML = '';
        const allAlbums = getAllAlbums();
        if (allAlbums && allAlbums.length > 0) {
            allAlbums.forEach(album => {
                const label = document.createElement('label');
                label.style.display = 'flex';
                label.style.alignItems = 'center';
                label.style.gap = '4px';
                label.style.cursor = 'pointer';
                label.style.color = '#e0f2fe';
                label.style.fontSize = '11px';
                label.style.padding = '3px 8px';
                label.style.background = 'rgba(59,130,246,0.25)';
                label.style.border = '1px solid rgba(59,130,246,0.4)';
                label.style.borderRadius = '5px';
                label.style.whiteSpace = 'nowrap';
                label.style.transition = 'all 0.2s ease';
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = album;
                checkbox.checked = videoAlbums.includes(album);
                checkbox.style.cursor = 'pointer';
                checkbox.style.width = '14px';
                checkbox.style.height = '14px';
                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(album));
                label.addEventListener('mouseenter', () => {
                    label.style.background = 'rgba(59,130,246,0.4)';
                    label.style.borderColor = 'rgba(59,130,246,0.6)';
                });
                label.addEventListener('mouseleave', () => {
                    label.style.background = 'rgba(59,130,246,0.25)';
                    label.style.borderColor = 'rgba(59,130,246,0.4)';
                });
                container.appendChild(label);
            });
        }
        const level = (video.sourceIndex != null && video.sourceIndex >= 1 && video.sourceIndex <= 5) ? video.sourceIndex : 1;
        document.getElementById('levelSelect').value = level;
        document.getElementById('levelValue').textContent = video.sourceIndex ?? 0;
    }
    function getAllAlbums() {
        const albums = new Set();
        allVideos.forEach(v => {
            if (Array.isArray(v.albums)) {
                v.albums.forEach(a => albums.add(a));
            }
        });
        return Array.from(albums).sort();
    }
    function seekBy(seconds) {
        const player = document.getElementById('mainPlayer');
        if (!player || isNaN(player.currentTime)) return;
        const target = Math.max(0, Math.min(player.duration || Infinity, player.currentTime + seconds));
        player.currentTime = target;
    }
    function playOrPause() {
        const player = document.getElementById('mainPlayer');
        if (!player) return;
        if (player.paused || player.ended) {
            player.play();
        } else {
            player.pause();
        }
    }
    function initPlayerEvents() {
        const player = document.getElementById('mainPlayer');
        const seek = document.getElementById('seekBar');
        player.addEventListener('ended', () => {
            if (currentIndex < currentVideos.length - 1) {
                playNext();
            }
        });
        player.addEventListener('play', () => {
            const btn = document.getElementById('playPauseBtn');
            if (btn) btn.textContent = '⏸';
        });
        player.addEventListener('pause', () => {
            const btn = document.getElementById('playPauseBtn');
            if (btn) btn.textContent = '▶';
        });
        player.addEventListener('timeupdate', updateTimeline);
        player.addEventListener('loadedmetadata', updateTimeline);
        player.addEventListener('volumechange', () => {
            const muteBtn = document.getElementById('muteBtn');
            const volume = document.getElementById('volumeSlider');
            if (muteBtn) muteBtn.textContent = player.muted ? '🔇' : '🔊';
            if (volume) volume.value = player.muted ? 0 : player.volume;
        });
        player.addEventListener('waiting', () => setBuffering(true));
        player.addEventListener('stalled', () => setBuffering(true));
        player.addEventListener('seeking', () => setBuffering(true));
        player.addEventListener('playing', () => setBuffering(false));
        player.addEventListener('canplay', () => setBuffering(false));
        player.addEventListener('seeked', () => setBuffering(false));
        if (seek) {
            seek.addEventListener('mousemove', updateSeekPreviewFromEvent);
            seek.addEventListener('mouseleave', hideSeekPreview);
        }
    }
    function closePlayer() { 
        const p = document.getElementById('mainPlayer'); 
        p.pause(); 
        p.src=''; 
        document.getElementById('playerModal').style.display='none'; 
        const seek = document.getElementById('seekBar');
        if (seek) seek.value = 0;
        const cur = document.getElementById('currentTime');
        if (cur) cur.textContent = '00:00';
        hideSeekPreview();
        setBuffering(false);
        currentIndex = -1;
    }
    function playNext() { 
        if (!currentVideos || currentVideos.length===0) return; 
        const next=(currentIndex+1)%currentVideos.length; 
        openPlayerByIndex(next); 
    }
    function playPrevious() { 
        if (!currentVideos || currentVideos.length===0) return; 
        const prev=(currentIndex-1+currentVideos.length)%currentVideos.length; 
        openPlayerByIndex(prev); 
    }
    async function checkAuthentication() {
        try {
            const res = await fetch('/api/config/auth/check');
            const isAuthenticated = await res.json();
            if (!isAuthenticated) {
                window.location.href = '/login';
            }
        } catch (e) {
            console.error('Erreur vérification auth:', e);
            window.location.href = '/login';
        }
    }
    async function logout() {
        if (confirm('Êtes-vous sûr de vouloir vous déconnecter ?')) {
            try {
                await fetch('/api/config/logout');
                window.location.href = '/login';
            } catch (e) {
                console.error('Erreur logout:', e);
            }
        }
    }
    window.addEventListener('load', async () => { 
        await checkAuthentication();
        initPlayerEvents();
        await loadRecently(); 
    });
    document.addEventListener('keydown', (e) => {
        const modalVisible = document.getElementById('playerModal').style.display === 'flex';
        if (!modalVisible) return;
        if (e.key === 'PageDown') {
            playNext();
        } else if (e.key === 'PageUp') {
            playPrevious();
        } else if (e.key === 'ArrowRight') {
            seekBy(10);
        } else if (e.key === 'ArrowLeft') {
            seekBy(-10);
        } else if (e.key === 'Escape') {
            closePlayer();
        }
    });
</script>
</body>
</html>
